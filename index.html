<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tạo link Affiliate - Shopee / Lazada / Tiki / TikTok</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background-color: #eaf5f2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      padding: 28px 32px;
      width: 90%;
      max-width: 750px;
    }
    h2 {
      text-align: center;
      color: #1d6f57;
      font-size: 1.6rem;
      margin-top: 0;
    }
    textarea {
      width: 100%;
      border: 1px solid #cce3dc;
      border-radius: 10px;
      padding: 12px;
      resize: vertical;
      font-size: 15px;
      min-height: 120px;
      background-color: #f6fbf9;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      justify-content: center;
    }
    button {
      background-color: #2e8b69;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #256c51;
    }
    label {
      font-weight: 600;
      display: block;
      margin: 10px 0 6px;
      color: #1d6f57;
      text-align: left;
    }
    .result {
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔗 Tạo link Shopee - Lazada - Tiki - TikTok</h2>
    <p style="text-align:center; color:#3a3a3a; margin-bottom:20px">
      Dán link gốc hoặc link rút gọn — hệ thống tự gắn Affiliate ID & TinyURL.
    </p>

    <label for="input">Nơi dán link của bạn</label>
    <textarea id="input" placeholder=""></textarea>

    <div class="buttons">
      <button onclick="generateLinks()">Tạo Link Ngay</button>
      <button onclick="copyResult()">Sao chép Kết quả</button>
    </div>

    <div class="result">
      <label>Kết quả</label>
      <textarea id="output" placeholder="Kết quả sẽ hiển thị ở đây..."></textarea>
    </div>
  </div>

  <script>
    const shopeeId = "17351700112";
    const lazadaId = "218701259";

    async function expandShopeeLink(shortUrl) {
      try {
        const res = await fetch(shortUrl, { method: "HEAD", redirect: "follow" });
        return res.url || shortUrl;
      } catch {
        return shortUrl;
      }
    }

    async function shortenTiny(url) {
      try {
        const res = await fetch("https://api.tinyurl.com/create", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer 1",
          },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        return data.data?.tiny_url || url;
      } catch {
        return url;
      }
    }

    function cleanAffiliateParams(url) {
      try {
        const u = new URL(url);
        ["af_id", "aff_id", "utm_source", "utm_medium", "utm_campaign"].forEach(p => u.searchParams.delete(p));
        return u.toString().replace(/(\?|&)$/, "");
      } catch {
        return url;
      }
    }

    async function processUrl(url) {
      let newUrl = cleanAffiliateParams(url);

      // Shopee rút gọn
      if (newUrl.includes("s.shopee.vn") || newUrl.includes("shp.ee")) {
        const expanded = await expandShopeeLink(newUrl);
        newUrl = cleanAffiliateParams(expanded);
        newUrl = expanded.includes("?")
          ? `${newUrl}&af_id=${shopeeId}`
          : `${newUrl}?af_id=${shopeeId}`;
      }
      // Shopee gốc
      else if (newUrl.includes("shopee.vn")) {
        newUrl = newUrl.includes("?")
          ? `${newUrl}&af_id=${shopeeId}`
          : `${newUrl}?af_id=${shopeeId}`;
      }
      // Lazada
      else if (newUrl.includes("lazada.vn")) {
        newUrl = newUrl.includes("?")
          ? `${newUrl}&aff_id=${lazadaId}`
          : `${newUrl}?aff_id=${lazadaId}`;
      }

      // Rút gọn link sau khi thêm aff ID
      return await shortenTiny(newUrl);
    }

    async function generateLinks() {
      const input = document.getElementById("input").value.trim();
      const output = document.getElementById("output");
      if (!input) return;

      const lines = input.split(/\n+/);
      let results = [];

      for (const line of lines) {
        const match = line.match(/https?:\/\/[\w\.-]+\S*/);
        if (!match) {
          results.push(line);
          continue;
        }

        const url = match[0];
        const newLink = await processUrl(url);
        results.push(line.replace(url, newLink));
      }

      output.value = results.join("\n");
    }

    function copyResult() {
      const output = document.getElementById("output");
      output.select();
      document.execCommand("copy");
    }
  </script>
</body>
</html>
