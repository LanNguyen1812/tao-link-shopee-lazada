<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tạo link Shopee - Lazada - Tiki - TikTok</title>
  <link rel="icon" href="favicon.ico" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #eaf5f2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      padding: 28px 32px;
      width: 90%;
      max-width: 750px;
    }
    h2 {
      text-align: center;
      color: #1d6f57;
      font-size: 1.6rem;
      margin-top: 0;
    }
    textarea {
      width: 100%;
      border: 1px solid #cce3dc;
      border-radius: 10px;
      padding: 12px;
      resize: vertical;
      font-size: 15px;
      min-height: 120px;
      background-color: #f6fbf9;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      justify-content: center;
    }
    button {
      background-color: #2e8b69;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #256c51;
    }
    label {
      font-weight: 600;
      display: block;
      margin: 10px 0 6px;
      color: #1d6f57;
      text-align: left;
    }
    .result {
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔗 Tạo link Shopee - Lazada - Tiki - TikTok</h2>
    <p style="text-align:center; color:#3a3a3a; margin-bottom:20px">
      Công cụ tạo link affiliate nhanh, hỗ trợ nhiều dòng & giữ nguyên mô tả.
    </p>

    <label for="input">Nơi dán link của bạn</label>
    <textarea id="input" placeholder=""></textarea>

    <div class="buttons">
      <button onclick="generateLinks()">Tạo Link Ngay</button>
      <button onclick="copyResult()">Sao chép Kết quả</button>
    </div>

    <div class="result">
      <label>Kết quả</label>
      <textarea id="output" placeholder="Kết quả sẽ hiển thị ở đây..."></textarea>
    </div>
  </div>

  <script>
    async function expandShopeeLink(shortUrl) {
      try {
        // gọi HEAD để lấy link đích (redirect)
        const response = await fetch(shortUrl, { method: "HEAD", redirect: "follow" });
        return response.url || shortUrl;
      } catch (err) {
        console.warn("Không expand được:", shortUrl);
        return shortUrl;
      }
    }

    async function generateLinks() {
      const input = document.getElementById('input').value.trim();
      const output = document.getElementById('output');
      if (!input) return alert('Vui lòng dán link hoặc nội dung cần xử lý.');

      const lines = input.split(/\n+/);
      const shopeeId = '17351700112';
      const lazadaId = '218701259';
      const tikiId = '';
      const tiktokId = '';

      let results = [];

      for (const line of lines) {
        const match = line.match(/https?:\/\/[\w\.-]+\S*/);
        if (!match) {
          results.push(line);
          continue;
        }

        let url = match[0];
        let newUrl = url;

        // Shopee link rút gọn
        if (url.includes('s.shopee.vn') || url.includes('shp.ee')) {
          const expanded = await expandShopeeLink(url);
          newUrl = expanded.includes('?')
            ? `${expanded}&af_id=${shopeeId}`
            : `${expanded}?af_id=${shopeeId}`;
        }
        // Shopee link gốc
        else if (url.includes('shopee.vn')) {
          newUrl = url.includes('?')
            ? `${url}&af_id=${shopeeId}`
            : `${url}?af_id=${shopeeId}`;
        }
        // Lazada
        else if (url.includes('lazada.vn')) {
          newUrl = url.includes('?')
            ? `${url}&aff_id=${lazadaId}`
            : `${url}?aff_id=${lazadaId}`;
        }
        // Tiki
        else if (url.includes('tiki.vn')) {
          newUrl = url.includes('?')
            ? `${url}&aff_id=${tikiId}`
            : `${url}?aff_id=${tikiId}`;
        }
        // TikTok
        else if (url.includes('tiktok.com')) {
          newUrl = url.includes('?')
            ? `${url}&aff_id=${tiktokId}`
            : `${url}?aff_id=${tiktokId}`;
        }

        const finalLine = line.replace(url, newUrl);
        results.push(finalLine);
      }

      output.value = results.join('\n');
      alert('Đã tạo xong link affiliate!');
    }

    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('Đã sao chép kết quả!');
    }
  </script>
</body>
</html>
